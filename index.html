<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <div class="container">
        <header class="headerr_container">
             <h1>CodeForRise Blogs</h1>
             <p> this is my new blog website using css </p>

        <main class="main_container">
            <!-- card1 start -->
                 <div class="card_container">
                    <a href="#" class="card_img">
                        <img src="second.jpg" alt="card image" class="card_image"
                        loading="lazy">
                    </a>
                   <!-- card title container -->
                   <div class="card_title_container">

                        <div class="author_info_container">
                            <span>
                                John Doe
                            </span>
                            <span>
                                19 apl 2026
                            </span>
                        </div>

                      <div class="card__tagcontainer"></div>
